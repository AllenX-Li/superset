name: Sync Upstream Analysis

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force full re-analysis from last 30 upstream commits, ignoring last-sync file"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  sync-upstream:
    name: Sync Upstream Analysis
    runs-on: ubuntu-latest
    # Only run on the fork, never on the upstream repo
    if: github.repository == 'AllenX-Li/superset'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/superset-sh/superset.git
          git fetch upstream main --no-tags

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run upstream sync analysis with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_ANALYSIS: ${{ github.event.inputs.force || 'false' }}
        run: |
          claude -p "$(cat .github/prompts/sync-upstream.md)" \
            --model sonnet \
            --allowedTools "Bash(git*)" "Bash(gh*)" "Bash(date*)" "Bash(ls*)" "Bash(mkdir*)" "Bash(cat*)" "Read" "Write" "Edit" "Glob" "Grep"
