name: Sync Upstream Analysis

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force full re-analysis from last 30 upstream commits, ignoring last-sync file"
        required: false
        default: false
        type: boolean

jobs:
  sync-upstream:
    name: Sync Upstream Analysis
    runs-on: ubuntu-latest
    # Only run on the fork, never on the upstream repo
    if: github.repository == 'AllenX-Li/superset'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/superset-sh/superset.git
          git fetch upstream main --no-tags

      - name: Run sync analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_ANALYSIS: ${{ github.event.inputs.force || 'false' }}
        run: bash .github/scripts/sync-upstream.sh
